# Industry-agnostic search configuration
# This file defines global search patterns and data schema that apply across all industries
# Update the global_search_queries section to add new search patterns
# Update the schema_fields section to modify the standard data fields collected

# Global search queries with placeholders
# These patterns can be used across different industries by substituting the placeholders
# Available placeholders: {commodity}, {country}, {industry}
# Focus: EU-bound exporters
global_search_queries:
  - "{commodity} exporters in {country} to EU directory"
  - "list of {commodity} manufacturers in {country} exporting to Europe"
  - "{commodity} suppliers in {country} EU market"
  - "{industry} companies in {country} European Union export"
  - "verified {commodity} exporters {country} EU"
  - "{commodity} manufacturers directory {country} REX registered"
  - "{commodity} exporters {country} Europages"
  - "{industry} businesses in {country} with EU contact details"
  - "{commodity} {country} exporters to Germany France Netherlands"
  - "site:europages.com {commodity} {country}"

# Standard schema fields for company data
# These are the core data fields that should be collected for every company
schema_fields:
  - name
  - website
  - industry
  - location

# Industry-specific configurations
# Add industry-specific search patterns or field requirements here as needed
# Example structure:
# industries:
#   textiles:
#     additional_fields:
#       - product_category
#       - certification
#   electronics:
#     additional_fields:
#       - product_type
#       - compliance
industries: {}
